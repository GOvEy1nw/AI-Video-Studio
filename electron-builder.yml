appId: ai.video.studio
productName: AiVS
copyright: Copyright © 2026 AI Video Studio

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
  - LICENSE.txt
  - NOTICES.md
  - "!**/*.map"

asarUnpack:
  - dist/splash/**

extraResources:
  - from: backend
    to: backend
    filter:
      - "**/*.py"
      - pyproject.toml
      - uv.lock
      - .python-version
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!.venv/**"
      - "!outputs/**"
      - "!models/**"
      - "!tests/**"
  - from: Wan2GP
    to: Wan2GP
    filter:
      - "**/*"
      - "!**/.git/**"
      - "!docs/**"
      - "!**/.venv/**"
      - "!**/__pycache__/**"
      - "!**/*.pyc"
      - "!**/.codegraph/**"
      - "!ckpts/**"
      - "!loras/**"
      - "!outputs/**"
      - "!release/**"
  - from: python-bootstrap
    to: python-bootstrap
  - from: git-bootstrap
    to: git
  - from: scripts
    to: scripts
    filter:
      - install-python-dependencies.ps1
      - install-wangp-stack.ps1
      - wangp-stacks.json
  - from: resources/vc_redist.x64.exe
    to: vc_redist.x64.exe

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico
  artifactName: ${productName}-Setup.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  include: resources/installer.nsh
  installerIcon: resources/icon.ico
  uninstallerIcon: resources/icon.ico
  installerHeaderIcon: resources/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: AiVS

mac:
  hardenedRuntime: true
  target:
    - target: dmg
      arch:
        - arm64
  icon: resources/icon.icns
  category: public.app-category.video
  artifactName: ${productName}-${arch}.${ext}

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

publish:
  provider: github
  owner: GOvEy1nw
  repo: AI-Video-Studio
